version: "3.9"

services:
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      SECRET_KEY: dev-secret-123
      DB_PATH: /app/users.db
    volumes:
      - user_data:/app

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      DB_PATH: /app/products.db
    volumes:
      - product_data:/app

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      DB_PATH: /app/orders.db
    volumes:
      - order_data:/app

  payment-service:
    build: ./payment-service
    container_name: payment-service
    environment:
      DB_PATH: /app/payments.db
    volumes:
      - payment_data:/app

  notification-service:
    build: ./notification-service
    container_name: notification-service
    environment:
      DB_PATH: /app/notifications.db
    volumes:
      - notification_data:/app

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    environment:
      DB_PATH: /app/inventory.db
    volumes:
      - inventory_data:/app

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
      - inventory-service

  # ✅ This is the CORRECT way to add dependency-check as an OPTIONAL service
  dependency-check:
    image: owasp/dependency-check:latest
    container_name: dependency-check
    volumes:
      - ./:/src
      - ./reports:/report
    command: --scan /src --format HTML --out /report --project "SecureShop"
    profiles:
      - scan  # This prevents it from starting with 'docker-compose up'

volumes:
  user_data:
  product_data:
  order_data:
  payment_data:
  notification_data:
  inventory_data: