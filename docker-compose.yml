version: '3.8'
services:
 # user-service:
  #  build: ./user-service
   # ports:
    #  - "8001:8001"

#version: "3.9"

#services:

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      SECRET_KEY: dev-secret-123
      JWT_SECRET: dev-jwt-secret
      DB_PATH: /data/users.db
      FLASK_DEBUG: "1"
    volumes:
      - user-data:/data

  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "8002:8002"
    environment:
      DB_PATH: /data/products.db
      FLASK_DEBUG: "1"
    volumes:
      - product-data:/data

volumes:
  user-data:
  product-data:
